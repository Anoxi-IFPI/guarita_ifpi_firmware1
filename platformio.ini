[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200

lib_ldf_mode = deep+
board_build.filesystem = littlefs 

lib_deps =
    miguelbalboa/MFRC522 @ ^1.4.10
    knolleary/PubSubClient @ ^2.8
    bodmer/TFT_eSPI @ ^2.5.43
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    https://github.com/tzapu/WiFiManager.git
    bblanchon/ArduinoJson @ ^6.21.5
    bodmer/TFT_eSPI@^2.5.0    
    chris--a/Keypad@^3.1.1
    ; joeyoung/arduino_keypads@^1.3.1 
    https://github.com/joeyoung/arduino_keypads.git
    
build_flags =
  -D USER_SETUP_LOADED=1
  -D ST7796_DRIVER=1
  -D TFT_SpiPort=3    ; <--- ESSA É A CHAVE: Força o uso do HSPI (Porta 3)
  -D TFT_MISO=12      ; Novos pinos HSPI
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=4
  -D LOAD_GLCD=1      ; <--- ESSAS SÃO AS FONTES (TEXTO)
  -D LOAD_FONT2=1     ; <--- FONTES PEQUENAS E MÉDIAS
  -D LOAD_FONT4=1     ; <--- FONTES GRANDES
  ; --- MODIFICAÇÃO DE ESTABILIDADE ---
  ; Baixamos de 40MHz para 20MHz para evitar que o ruído do display 
  ; atrapalhe a leitura do sensor RFID nos mesmos fios.
  -D SPI_FREQUENCY=20000000